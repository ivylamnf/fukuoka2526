<!DOCTYPE html>
<html lang="zh-Hant">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
<title>九州旅行行程</title>
<link rel="preconnect" href="https://fonts.googleapis.com">
<link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
<link href="https://fonts.googleapis.com/css2?family=Noto+Sans+TC:wght@300;400;500;700&family=Zen+Maru+Gothic:wght@400;500;700&display=swap" rel="stylesheet">
<link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.5.1/css/all.min.css">
<style>
*,*::before,*::after{box-sizing:border-box;margin:0;padding:0}
:root{
  --bg:#faf6f1;--bg2:#fff;--bg3:#f5efe8;
  --text:#2d2520;--text2:#6b5e54;--text3:#9e8e82;
  --accent:#c44569;--accent2:#e77f8f;--accent-soft:#fce4ec;
  --must:#c44569;--must-bg:#fce4ec;--must-border:#f1a7b5;
  --opt:#4a7c6f;--opt-bg:#e8f5e9;--opt-border:#a5d6a7;
  --hotel:#5c6bc0;--hotel-bg:#e8eaf6;--hotel-border:#9fa8da;
  --shadow:0 2px 12px rgba(45,37,32,.08);
  --shadow2:0 4px 20px rgba(45,37,32,.12);
  --radius:14px;--radius-sm:10px;
  --font-body:'Noto Sans TC',sans-serif;
  --font-jp:'Zen Maru Gothic','Noto Sans TC',sans-serif;
  --complete-bg:#f0ede8;--complete-text:#b5aa9e;
  --tab-active:#c44569;--tab-inactive:transparent;
  --divider:#e8dfd6;
  --progress-bg:#e8dfd6;--progress-fill:#c44569;
  --note-bg:#fdf8f0;--note-text:#8b7355;
  --map-btn:#e67e22;--map-btn-hover:#d35400;
}
.dark{
  --bg:#1a1614;--bg2:#252120;--bg3:#302a27;
  --text:#ede5dd;--text2:#b5aa9e;--text3:#7a6e63;
  --accent:#e77f8f;--accent2:#c44569;--accent-soft:#3d1f2a;
  --must:#e77f8f;--must-bg:#3d1f2a;--must-border:#6b2f3f;
  --opt:#81c784;--opt-bg:#1b3a2a;--opt-border:#2e6b3e;
  --hotel:#9fa8da;--hotel-bg:#1f2340;--hotel-border:#3f4580;
  --shadow:0 2px 12px rgba(0,0,0,.3);
  --shadow2:0 4px 20px rgba(0,0,0,.4);
  --complete-bg:#2a2623;--complete-text:#5c544c;
  --divider:#3a332e;
  --progress-bg:#3a332e;--progress-fill:#e77f8f;
  --note-bg:#2e2822;--note-text:#b5a07a;
  --map-btn:#e67e22;--map-btn-hover:#f39c12;
}

html{font-size:16px;-webkit-text-size-adjust:100%}
body{
  font-family:var(--font-body);background:var(--bg);color:var(--text);
  min-height:100vh;min-height:100dvh;overflow-x:hidden;
  transition:background .3s,color .3s;
}

/* ── HEADER ── */
.header{
  position:sticky;top:0;z-index:100;
  background:linear-gradient(135deg,var(--accent),#e96d7b);
  color:#fff;padding:16px 16px 0;
  box-shadow:0 4px 24px rgba(196,69,105,.25);
}
.dark .header{background:linear-gradient(135deg,#3d1f2a,#502535)}
.header-top{display:flex;align-items:center;gap:10px;margin-bottom:12px}
.header-icon{font-size:1.6rem}
.header h1{font-family:var(--font-jp);font-size:1.35rem;font-weight:700;letter-spacing:.5px}
.header-sub{font-size:.78rem;opacity:.85;margin-top:2px;font-weight:300}

/* ── DATE TABS ── */
.tabs-wrap{
  display:flex;gap:4px;overflow-x:auto;-webkit-overflow-scrolling:touch;
  scrollbar-width:none;padding-bottom:0;
}
.tabs-wrap::-webkit-scrollbar{display:none}
.tab-btn{
  flex-shrink:0;padding:8px 14px;border:none;
  background:rgba(255,255,255,.15);color:rgba(255,255,255,.8);
  font-family:var(--font-body);font-size:.8rem;font-weight:500;
  border-radius:10px 10px 0 0;cursor:pointer;
  transition:all .25s;white-space:nowrap;
  position:relative;
}
.tab-btn.active{
  background:var(--bg);color:var(--accent);font-weight:700;
}
.tab-btn .tab-date{display:block;font-size:.72rem;opacity:.7;margin-top:1px}
.tab-btn.active .tab-date{opacity:1;color:var(--text2)}
.tab-progress{
  display:block;height:3px;border-radius:2px;margin-top:4px;
  background:rgba(255,255,255,.2);overflow:hidden;
}
.tab-btn.active .tab-progress{background:var(--progress-bg)}
.tab-progress-fill{
  display:block;height:100%;border-radius:2px;
  background:rgba(255,255,255,.7);transition:width .4s ease;
}
.tab-btn.active .tab-progress-fill{background:var(--progress-fill)}

/* ── MAIN ── */
.main{padding:12px 12px 100px;max-width:680px;margin:0 auto}

/* ── DAY SECTION ── */
.day-section{display:none;animation:fadeUp .35s ease}
.day-section.active{display:block}
@keyframes fadeUp{from{opacity:0;transform:translateY(12px)}to{opacity:1;transform:translateY(0)}}

.day-header{
  display:flex;align-items:center;justify-content:space-between;
  padding:14px 0 8px;margin-bottom:6px;
}
.day-title{font-family:var(--font-jp);font-size:1.15rem;font-weight:700;color:var(--text)}
.day-stats{font-size:.75rem;color:var(--text3)}
.day-stats span{font-weight:600;color:var(--accent)}

.progress-bar{
  height:6px;border-radius:3px;background:var(--progress-bg);
  margin-bottom:16px;overflow:hidden;
}
.progress-bar-fill{height:100%;border-radius:3px;background:var(--progress-fill);transition:width .5s ease}

/* ── ITEM CARD ── */
.item-card{
  background:var(--bg2);border-radius:var(--radius);
  padding:14px;margin-bottom:10px;
  box-shadow:var(--shadow);border-left:4px solid transparent;
  transition:all .3s;position:relative;overflow:hidden;
}
.item-card.must{border-left-color:var(--must)}
.item-card.optional{border-left-color:var(--opt)}
.item-card.hotel{border-left-color:var(--hotel)}
.item-card.completed{
  background:var(--complete-bg);opacity:.65;
}
.item-card.completed .item-name,.item-card.completed .item-time{
  text-decoration:line-through;color:var(--complete-text);
}

.item-top{display:flex;align-items:flex-start;gap:10px}
.item-check{
  flex-shrink:0;width:26px;height:26px;border-radius:50%;
  border:2.5px solid var(--text3);background:transparent;
  cursor:pointer;display:flex;align-items:center;justify-content:center;
  transition:all .25s;margin-top:1px;position:relative;
  -webkit-tap-highlight-color:transparent;
}
.item-check:hover{border-color:var(--accent)}
.item-card.must .item-check{border-color:var(--must-border)}
.item-card.optional .item-check{border-color:var(--opt-border)}
.item-card.hotel .item-check{border-color:var(--hotel-border)}
.item-card.completed .item-check{
  background:var(--accent);border-color:var(--accent);
}
.item-check .fa-check{
  font-size:.7rem;color:#fff;opacity:0;transition:opacity .2s;
}
.item-card.completed .item-check .fa-check{opacity:1}

.item-body{flex:1;min-width:0}
.item-time{
  font-size:.72rem;color:var(--text3);font-weight:500;
  margin-bottom:2px;display:flex;align-items:center;gap:4px;
}
.item-time i{font-size:.65rem}
.item-name{font-size:.95rem;font-weight:600;color:var(--text);line-height:1.4;word-break:break-word}

.item-badges{display:flex;flex-wrap:wrap;gap:5px;margin-top:6px}
.badge{
  display:inline-flex;align-items:center;gap:3px;
  padding:2px 8px;border-radius:20px;font-size:.65rem;font-weight:600;
}
.badge-must{background:var(--must-bg);color:var(--must)}
.badge-opt{background:var(--opt-bg);color:var(--opt)}
.badge-hotel{background:var(--hotel-bg);color:var(--hotel)}

/* ── EXPANDABLE DETAILS ── */
.item-has-details{cursor:pointer;-webkit-tap-highlight-color:transparent}
.item-expand-hint{
  display:inline-flex;align-items:center;gap:4px;
  margin-top:6px;font-size:.68rem;color:var(--accent);font-weight:500;
  opacity:.8;transition:opacity .2s;
}
.item-has-details:hover .item-expand-hint{opacity:1}
.item-expand-hint i{font-size:.6rem;transition:transform .3s}
.item-card.expanded .item-expand-hint i{transform:rotate(180deg)}
.item-card.expanded .item-expand-hint .hint-text::after{content:"收起詳情"}
.item-card:not(.expanded) .item-expand-hint .hint-text::after{content:"查看詳情"}

.item-details{
  max-height:0;overflow:hidden;opacity:0;
  transition:max-height .35s ease, opacity .25s ease, margin .25s ease;
  margin-top:0;
}
.item-card.expanded .item-details{
  max-height:300px;opacity:1;margin-top:8px;
}

.item-note{
  padding:8px 10px;border-radius:var(--radius-sm);
  background:var(--note-bg);font-size:.76rem;color:var(--note-text);
  line-height:1.5;word-break:break-word;
}
.item-note i{margin-right:4px}

.item-address{
  margin-top:6px;font-size:.72rem;color:var(--text3);
  display:flex;align-items:flex-start;gap:4px;line-height:1.4;
}
.item-address i{margin-top:2px;flex-shrink:0}

.item-actions{display:flex;gap:6px;margin-top:8px;flex-wrap:wrap}
.map-btn{
  display:inline-flex;align-items:center;gap:5px;
  padding:7px 14px;border-radius:20px;border:none;
  background:var(--map-btn);color:#fff;font-size:.76rem;font-weight:600;
  cursor:pointer;transition:all .2s;text-decoration:none;
  font-family:var(--font-body);
  -webkit-tap-highlight-color:transparent;
}
.map-btn:hover{background:var(--map-btn-hover);transform:translateY(-1px)}
.map-btn i{font-size:.7rem}

/* ── SECTION DIVIDERS ── */
.time-group{
  margin-top:16px;margin-bottom:8px;padding-left:4px;
  display:flex;align-items:center;gap:8px;
}
.time-group::after{
  content:'';flex:1;height:1px;background:var(--divider);
}
.time-group-label{
  font-size:.72rem;font-weight:600;color:var(--text3);
  text-transform:uppercase;letter-spacing:.5px;white-space:nowrap;
}

/* ── OTHERS TAB ── */
.others-section .item-card{border-left-color:var(--text3)}
.others-cat{
  font-size:.68rem;color:var(--text3);font-weight:600;
  text-transform:uppercase;letter-spacing:.5px;
  margin:16px 0 6px 4px;
}

/* ── LEGEND ── */
.legend{
  display:flex;flex-wrap:wrap;gap:8px;margin-bottom:14px;
  padding:10px 12px;background:var(--bg2);border-radius:var(--radius-sm);
  box-shadow:var(--shadow);
}
.legend-item{display:flex;align-items:center;gap:5px;font-size:.72rem;color:var(--text2)}
.legend-dot{width:10px;height:10px;border-radius:50%;flex-shrink:0}
.legend-dot.must{background:var(--must)}
.legend-dot.opt{background:var(--opt)}
.legend-dot.hotel{background:var(--hotel)}

/* ── TOAST ── */
.toast{
  position:fixed;bottom:24px;left:50%;transform:translateX(-50%) translateY(80px);
  background:var(--bg2);color:var(--text);padding:10px 20px;
  border-radius:30px;box-shadow:var(--shadow2);font-size:.82rem;font-weight:500;
  z-index:200;opacity:0;transition:all .35s ease;pointer-events:none;
  white-space:nowrap;
}
.toast.show{opacity:1;transform:translateX(-50%) translateY(0)}

/* ── CUSTOM SCROLLBAR ── */
@media(hover:hover){
  ::-webkit-scrollbar{width:6px}
  ::-webkit-scrollbar-track{background:transparent}
  ::-webkit-scrollbar-thumb{background:var(--text3);border-radius:3px}
}

/* ── RESPONSIVE ── */
@media(max-width:400px){
  .header{padding:12px 12px 0}
  .header h1{font-size:1.15rem}
  .tab-btn{padding:6px 10px;font-size:.74rem}
  .item-card{padding:12px}
  .item-name{font-size:.88rem}
}
</style>
</head>

// ── STORAGE (IndexedDB) ──
let completedItems = {};
const DB_NAME = "kyushu_trip";
const STORE_NAME = "completed";

function openDB() {
  return new Promise(function(resolve, reject) {
    const req = indexedDB.open(DB_NAME, 1);
    req.onupgradeneeded = function() {
      const db = req.result;
      if (!db.objectStoreNames.contains(STORE_NAME)) {
        db.createObjectStore(STORE_NAME);
      }
    };
    req.onsuccess = function() { resolve(req.result); };
    req.onerror = function() { reject(req.error); };
  });
}

function loadCompleted() {
  openDB().then(function(db) {
    const tx = db.transaction(STORE_NAME, "readonly");
    const store = tx.objectStore(STORE_NAME);
    const req = store.get("data");
    req.onsuccess = function() {
      if (req.result) {
        completedItems = req.result;
      }
      renderAll();
    };
    req.onerror = function() { renderAll(); };
  }).catch(function() { renderAll(); });
}

function saveCompleted() {
  openDB().then(function(db) {
    const tx = db.transaction(STORE_NAME, "readwrite");
    const store = tx.objectStore(STORE_NAME);
    store.put(completedItems, "data");
  }).catch(function() { /* no-op */ });
}
function getItemId(dayId, idx) { return dayId + "_" + idx; }

// ── TOAST ──
let toastTimer = null;
function showToast(msg) {
  const t = document.getElementById("toast");
  t.textContent = msg;
  t.classList.add("show");
  if (toastTimer) clearTimeout(toastTimer);
  toastTimer = setTimeout(() => t.classList.remove("show"), 1800);
}

// ── RENDER ──
let activeTab = 0;

function getDayProgress(day) {
  const total = day.items.length;
  let done = 0;
  day.items.forEach((_, i) => {
    if (completedItems[getItemId(day.id, i)]) done++;
  });
  return { total, done, pct: total ? Math.round(done / total * 100) : 0 };
}

function renderTabs() {
  const wrap = document.getElementById("tabsWrap");
  let html = "";
  TRIP_DATA.days.forEach((day, i) => {
    const p = getDayProgress(day);
    html += '<button class="tab-btn' + (i === activeTab ? " active" : "") + '" data-idx="' + i + '">'
      + '<span>' + day.label + '</span>'
      + '<span class="tab-date">' + day.date + '</span>'
      + '<span class="tab-progress"><span class="tab-progress-fill" style="width:' + p.pct + '%"></span></span>'
      + '</button>';
  });
  // Others tab
  html += '<button class="tab-btn' + (activeTab === TRIP_DATA.days.length ? " active" : "") + '" data-idx="' + TRIP_DATA.days.length + '">'
    + '<span>其他</span>'
    + '<span class="tab-date">備選</span>'
    + '<span class="tab-progress"><span class="tab-progress-fill" style="width:0%"></span></span>'
    + '</button>';
  wrap.innerHTML = html;
  wrap.querySelectorAll(".tab-btn").forEach(btn => {
    btn.addEventListener("click", function() {
      activeTab = parseInt(this.dataset.idx);
      renderAll();
      this.scrollIntoView({ behavior: "smooth", inline: "center", block: "nearest" });
    });
  });
}

function renderItemCard(item, dayId, idx) {
  const itemId = getItemId(dayId, idx);
  const done = completedItems[itemId];
  const cls = item.type === "hotel" ? "hotel" : (item.type === "must" ? "must" : "optional");
  const badgeCls = item.type === "hotel" ? "badge-hotel" : (item.type === "must" ? "badge-must" : "badge-opt");
  const badgeText = item.type === "hotel" ? "🏨 住宿" : (item.type === "must" ? "⭐ 必去" : "💫 可選");
  const hasDetails = item.note || item.address || item.mapUrl;

  let h = '<div class="item-card ' + cls + (done ? " completed" : "") + (hasDetails ? " item-has-details" : "") + '" data-id="' + itemId + '">';
  h += '<div class="item-top">';
  h += '<button class="item-check" data-id="' + itemId + '" aria-label="標記完成"><i class="fas fa-check"></i></button>';
  h += '<div class="item-body">';
  if (item.time) {
    h += '<div class="item-time"><i class="far fa-clock"></i> ' + escHtml(item.time) + '</div>';
  }
  h += '<div class="item-name">' + escHtml(item.name) + '</div>';
  h += '<div class="item-badges"><span class="badge ' + badgeCls + '">' + badgeText + '</span></div>';
  if (hasDetails) {
    h += '<div class="item-expand-hint"><i class="fas fa-chevron-down"></i> <span class="hint-text"></span></div>';
    h += '<div class="item-details">';
    if (item.note) {
      h += '<div class="item-note"><i class="fas fa-info-circle"></i> ' + escHtml(item.note) + '</div>';
    }
    if (item.address) {
      h += '<div class="item-address"><i class="fas fa-map-marker-alt"></i> <span>' + escHtml(item.address) + '</span></div>';
    }
    if (item.mapUrl) {
      h += '<div class="item-actions"><a class="map-btn" href="' + escHtml(item.mapUrl) + '" target="_blank" rel="noopener"><i class="fas fa-map-location-dot"></i> Google 地圖</a></div>';
    }
    h += '</div>';
  }
  h += '</div></div></div>';
  return h;
}

function renderDay(day, dayIdx) {
  const p = getDayProgress(day);
  let h = '<div class="day-section' + (dayIdx === activeTab ? " active" : "") + '" data-day="' + dayIdx + '">';
  h += '<div class="day-header"><div><div class="day-title">' + escHtml(day.date) + " " + escHtml(day.weekday) + '</div>'
    + '<div class="day-stats" style="margin-top:2px;font-size:.78rem;color:var(--text3)">'
    + '<i class="fas fa-route" style="margin-right:3px"></i> ' + escHtml(day.region) + '</div></div>'
    + '<div class="day-stats"><span>' + p.done + '</span> / ' + p.total + ' 完成</div></div>';
  h += '<div class="progress-bar"><div class="progress-bar-fill" style="width:' + p.pct + '%"></div></div>';

  h += '<div class="legend">';
  h += '<div class="legend-item"><div class="legend-dot must"></div>必去行程</div>';
  h += '<div class="legend-item"><div class="legend-dot opt"></div>可選行程</div>';
  h += '<div class="legend-item"><div class="legend-dot hotel"></div>住宿</div>';
  h += '</div>';

  day.items.forEach((item, i) => {
    h += renderItemCard(item, day.id, i);
  });
  h += '</div>';
  return h;
}

function renderOthers() {
  let h = '<div class="day-section others-section' + (activeTab === TRIP_DATA.days.length ? " active" : "") + '">';
  h += '<div class="day-header"><div class="day-title">其他考慮景點</div></div>';

  const cats = {};
  TRIP_DATA.others.forEach(item => {
    const c = item.cat || "其他";
    if (!cats[c]) cats[c] = [];
    cats[c].push(item);
  });

  const catIcons = {"玩":"🎮","食":"🍜","博多車站":"🚉","其他":"📌"};
  Object.keys(cats).forEach(cat => {
    h += '<div class="others-cat">' + (catIcons[cat] || "📌") + " " + escHtml(cat) + '</div>';
    cats[cat].forEach((item, i) => {
      const itemId = "other_" + cat + "_" + i;
      const done = completedItems[itemId];
      const hasDetails = item.note || item.address || item.mapUrl;
      h += '<div class="item-card' + (done ? " completed" : "") + (hasDetails ? " item-has-details" : "") + '" data-id="' + itemId + '">';
      h += '<div class="item-top">';
      h += '<button class="item-check" data-id="' + itemId + '" aria-label="標記完成"><i class="fas fa-check"></i></button>';
      h += '<div class="item-body">';
      h += '<div class="item-name">' + escHtml(item.name) + '</div>';
      if (hasDetails) {
        h += '<div class="item-expand-hint"><i class="fas fa-chevron-down"></i> <span class="hint-text"></span></div>';
        h += '<div class="item-details">';
        if (item.note) {
          h += '<div class="item-note"><i class="fas fa-info-circle"></i> ' + escHtml(item.note) + '</div>';
        }
        if (item.address) {
          h += '<div class="item-address"><i class="fas fa-map-marker-alt"></i> <span>' + escHtml(item.address) + '</span></div>';
        }
        if (item.mapUrl) {
          h += '<div class="item-actions"><a class="map-btn" href="' + escHtml(item.mapUrl) + '" target="_blank" rel="noopener"><i class="fas fa-map-location-dot"></i> Google 地圖</a></div>';
        }
        h += '</div>';
      }
      h += '</div></div></div>';
    });
  });
  h += '</div>';
  return h;
}

function escHtml(s) {
  if (!s) return "";
  const d = document.createElement("div");
  d.textContent = s;
  return d.innerHTML;
}

function renderAll() {
  renderTabs();
  const main = document.getElementById("mainContent");
  let html = "";
  TRIP_DATA.days.forEach((day, i) => { html += renderDay(day, i); });
  html += renderOthers();
  main.innerHTML = html;
  attachCheckHandlers();
}

function attachCheckHandlers() {
  document.querySelectorAll(".item-check").forEach(btn => {
    btn.addEventListener("click", function(e) {
      e.stopPropagation();
      const id = this.dataset.id;
      if (completedItems[id]) {
        delete completedItems[id];
        showToast("已取消完成標記 ✏️");
      } else {
        completedItems[id] = true;
        showToast("已標記為完成 ✅");
      }
      saveCompleted();
      renderAll();
    });
  });

  // Expand / collapse details on card click
  document.querySelectorAll(".item-has-details").forEach(card => {
    card.addEventListener("click", function(e) {
      // Don't toggle when clicking checkbox or map link
      if (e.target.closest(".item-check") || e.target.closest(".map-btn")) return;
      this.classList.toggle("expanded");
    });
  });
}

// ── FORCE LIGHT MODE ──
document.documentElement.classList.remove("dark");

// ── INIT ──
// loadCompleted calls renderAll after data is loaded from IndexedDB
loadCompleted();

// Scroll active tab into view on load
setTimeout(function() {
  var activeBtn = document.querySelector(".tab-btn.active");
  if (activeBtn) activeBtn.scrollIntoView({ behavior: "smooth", inline: "center", block: "nearest" });
}, 300);
</script>
</body>
</html>
